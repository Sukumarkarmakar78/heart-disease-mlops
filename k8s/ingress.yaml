apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: heart-api-ingress
  labels:
    app: heart-api
spec:
  rules:
    - host: heart-api.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: heart-api-service
                port:
                  number: 80
